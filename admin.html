  <style>

    .toast-eco { pointer-events: auto; background: var(--card); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-radius: 14px; padding: 14px 16px 14px 18px; box-shadow: 0 16px 48px -12px rgba(0,0,0,.3); min-width: 340px; max-width: 440px; display: flex; align-items: flex-start; gap: 12px; color: var(--text); font-size: .88rem; border: 1px solid var(--border); position: relative; overflow: hidden; line-height: 1.4; animation: toastSlideIn .35s cubic-bezier(.22,1,.36,1); }
    .toast-eco .toast-icon { width: 32px; height: 32px; min-width: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: .95rem; flex-shrink: 0; }

    .toast-eco.warn .toast-icon { background: #fef3c7; color: #f59e0b; }
    .toast-eco.info .toast-icon { background: #dbeafe; color: #2563eb; }
    [data-theme="dark"] .toast-eco.success .toast-icon { background: #052e16; color: #22c55e; }

    .toast-eco .toast-close:hover { background: var(--soft); color: var(--text); }

  <script>

    // [UPGRADE-5] Admin session management
    var adminSessionId = sessionStorage.getItem('eco_admin_session');

    $(document).ajaxError(function(event, xhr, settings) {
      if (xhr.status === 403) {
        try {
          var resp = JSON.parse(xhr.responseText);
          if (resp.code === 'SESSION_EXPIRED' || resp.code === 'FORBIDDEN') {
            sessionStorage.removeItem('eco_admin_session');
            adminSessionId = null;
            if (typeof toast === 'function') {
              toast('Phiên làm việc hết hạn. Vui lòng đăng nhập lại.', 'error', 5000);
            }
            setTimeout(function() { window.location.href = 'index.html'; }, 2000);
          }
        } catch(e) {}
      }
    });

    function saveDB() {
      const sess = DB.session;
      DB.session = null;
      localStorage.setItem(DB_KEY, JSON.stringify(DB));
      DB.session = sess;
      if (sess) sessionStorage.setItem("eco_session", JSON.stringify(sess));
      else sessionStorage.removeItem("eco_session");
    }
    function loadDB() {
      const raw = localStorage.getItem(DB_KEY);
      if (raw) { try { DB = JSON.parse(raw); } catch (e) {} }
      const sess = sessionStorage.getItem("eco_session");
      if (sess) { try { DB.session = JSON.parse(sess); } catch (e) { DB.session = null; } } else DB.session = null;
      if (!DB.products || !DB.products.length || !DB._v || DB._v < 2) { seedDB(); }
      DB.users.forEach(u => {
        if (u.banned === undefined) u.banned = false;
        if (u.banType === undefined) u.banType = null;
        if (u.banMessage === undefined) u.banMessage = null;
        if (u.banExpiresAt === undefined) u.banExpiresAt = null;
        if (u.bannedAt === undefined) u.bannedAt = null;
        if (u.banReason === undefined) u.banReason = '';
        if (u.membershipType === undefined) u.membershipType = 'Thường';
        if (u.membershipPlan === undefined) u.membershipPlan = null;
        if (u.membershipPlanName === undefined) u.membershipPlanName = null;
        if (u.membershipStartDate === undefined) u.membershipStartDate = null;
        if (u.membershipEndDate === undefined) u.membershipEndDate = null;
        if (u.membershipDiscount === undefined) u.membershipDiscount = 0;
        if (u.membershipFreeShipping === undefined) u.membershipFreeShipping = 0;

      if (!DB.appeals) DB.appeals = [];
      const _now = Date.now();
      DB.users.forEach(u => {
        if (u.banned && u.banType === "ban" && u.banExpiresAt && u.banExpiresAt <= _now) {
          u.banned = false; u.banType = null; u.banMessage = null; u.banExpiresAt = null; u.bannedAt = null;
        }
      });
      const oldAdmin = DB.users.find(u => u.username === "admin" || u.email === "admin@ecoshop.com");
      if (oldAdmin) { oldAdmin.username = "admeco"; oldAdmin.email = "admeco@ecoshop.com"; if (oldAdmin.password === "admin123") oldAdmin.password = "eco123"; saveDB(); }

      DB.listings.forEach(l => {
        if (l.status === undefined) l.status = "pending";
        if (l.adminNote === undefined) l.adminNote = "";
      });
      if (!DB.categories) DB.categories = [];
      if (!DB.listingOrders) DB.listingOrders = [];
      if (!DB.wallets) DB.wallets = {};
      if (!DB.reports) DB.reports = [];
      if (!DB.reviews) DB.reviews = [];
      if (!DB.farmNotify) DB.farmNotify = [];
      if (!DB.notifications) DB.notifications = {};
      if (DB.settings.platformFeeRate === undefined) DB.settings.platformFeeRate = 0.1;
    }

      if (coll === "users" && DB.session?.id === id) { toast("Bạn không thể tự xóa chính mình.", "error", 4000); return; }

          toast("Không thể xóa tài khoản quản trị cuối cùng.", "error", 4000);

    function slugify(s) { return String(s || '').toLowerCase().replace(/đ/g,'d').replace(/[àáạảãâầấậẩẫăằắặẳẵ]/g,'a').replace(/[èéẹẻẽêềếệểễ]/g,'e').replace(/[ìíịỉĩ]/g,'i').replace(/[òóọỏõôồốộổỗơờớợởỡ]/g,'o').replace(/[ùúụủũưừứựửữ]/g,'u').replace(/[ỳýỵỷỹ]/g,'y').replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
    function toast(msg, type = "success", ms = 3000) {
      const icons = { success: "fa-check", error: "fa-xmark", warn: "fa-exclamation", info: "fa-info" };
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const t = $(`<div class="toast-eco ${type}"><div class="toast-icon"><i class="fa-solid ${icons[type]}"></i></div><div class="toast-body"><div class="toast-msg">${msg}</div><div class="toast-time">${timeStr}</div></div><button class="toast-close" onclick="$(this).closest('.toast-eco').remove();"><i class="fa-solid fa-xmark"></i></button><div class="toast-bar" style="animation-duration:${ms}ms"></div></div>`);
      $("#toasts").append(t);
      setTimeout(() => {
        t.css({ opacity: 0, transform: "translateX(calc(100% + 30px)) scale(.92)", transition: "all .3s ease" });
        setTimeout(() => t.remove(), 300);
      }, ms);
      t.on("mouseenter", () => t.find(".toast-bar").css("animation-play-state", "paused"));

    }

    function execAdminLogin() {

      $.ajax({
        url: '/api/admin/login',
        method: 'POST',

        data: JSON.stringify({ username: username, password: password }),
        success: function(resp) {
          if (resp.success && resp.sessionId) {

            sessionStorage.setItem('eco_admin_session', resp.sessionId);
            $.ajaxSetup({ headers: { 'X-Admin-Session': resp.sessionId } });

          if (xhr.responseJSON && xhr.responseJSON.message) msg = xhr.responseJSON.message;
          else if (xhr.responseText) { try { var j = JSON.parse(xhr.responseText); if (j.message) msg = j.message; } catch(e) {} }
          $('#adminLoginError').text(msg).show();

    function renderUsers() {
      const _now = Date.now();
      var changed = false;
      DB.users.forEach(u => {
        if (u.banned && u.banType === "ban" && u.banExpiresAt && u.banExpiresAt <= _now) {
          u.banned = false; u.banType = null; u.banMessage = null; u.banExpiresAt = null; u.bannedAt = null; u.banReason = null;
          changed = true;
        }
      });
      if (changed) saveDB();
      var localUsers = DB.users.filter(u => u.role !== "admin");
      $("#adminMain").html(`<div class="admin-top"><h2>Người dùng</h2><div style="display:flex;gap:8px;align-items:center"><button class="btn-eco" onclick="showAddAdmin()" style="font-size:.85rem;padding:9px 16px"><i class="fa-solid fa-shield"></i> Thêm quản trị</button><span style="color:var(--muted);font-size:.9rem" id="userCount">${localUsers.length} tài khoản</span></div></div>
    <div class="panel"><table class="table-eco"><thead><tr><th>Tên đăng nhập</th><th>Họ tên</th><th>Email</th><th>Đơn hàng</th><th>Tổng chi tiêu</th><th>Trạng thái</th><th>Ngày tham gia</th><th>Nguồn</th><th></th></tr></thead>
    <tbody id="usersBody">${renderUserRows(localUsers, _now, 'local')}</tbody></table></div>`);
      $.ajax({
        url: '/api/users',
        method: 'GET',
        dataType: 'json',
        success: function (serverUsers) {
          if (serverUsers && serverUsers.length) {
            var merged = serverUsers.slice();
            var localIds = new Set();
            localUsers.forEach(function(lu) {
              if (lu.id_server) localIds.add(String(lu.id_server));
            });
            var newFromServer = merged.filter(function(su) { return su.role !== 'admin' && !localIds.has(String(su.id)); });
            if (newFromServer.length > 0) {
              newFromServer.forEach(function(su) {
                var exists = localUsers.find(function(lu) { return lu.username === su.username || lu.email === su.email; });
                if (!exists) {
                  var mapped = {
                    id: 'U' + su.id,
                    id_server: su.id,
                    fullName: su.fullName || su.username,
                    username: su.username,
                    email: su.email,
                    phone: su.phone || '',
                    password: su.password,
                    role: su.role || 'user',
                    banned: su.banned || false,
                    banType: su.banType || null,
                    banMessage: su.banMessage || null,
                    banExpiresAt: su.banExpiresAt || null,
                    bannedAt: su.bannedAt || null,
                    createdAt: su.createdAt ? new Date(su.createdAt).getTime() : Date.now(),
                    avatar: (su.fullName || su.username)[0].toUpperCase(),
                    address: ''
                  };
                  DB.users.push(mapped);
                  localUsers.push(mapped);
                  changed = true;
                }
              });
              if (changed) saveDB();
              var allUsers = localUsers;
              $('#usersBody').html(renderUserRows(allUsers, _now, 'local'));
              $('#userCount').text(allUsers.length + ' tài khoản');
            }
          }
        }
      });
    }
    function renderUserRows(users, _now, source) {
      return users.map(function(u) {
        const userOrders = DB.orders.filter(o => o.userId === u.id);
        const spent = userOrders.reduce((s, o) => s + o.total, 0);
        let st = "Hoạt động", stDetail = "", sc = "", ss = "background:var(--soft);color:var(--secondary)";
        if (u.banned) {
          if (u.banType === "delete") {
            st = "Đã xóa vĩnh viễn"; sc = "err"; ss = "";
            if (u.bannedAt) {
              const appealRemain = 172800000 - (_now - u.bannedAt);
              if (appealRemain > 0) {
                const h = Math.floor(appealRemain / 3600000);
                const m = Math.floor((appealRemain % 3600000) / 60000);
                stDetail = '<br><span style="font-size:.72rem;color:#f59e0b;font-weight:600">⏳ Khiếu nại: ' + h + 'h' + m + 'm</span>';
              } else {
                stDetail = '<br><span style="font-size:.72rem;color:var(--muted)">⏳ Hết hạn khiếu nại</span>';
              }
            }
          } else if (u.banExpiresAt && u.banExpiresAt < Infinity) {
            const r = u.banExpiresAt - _now;
            if (r > 0) { const h = Math.floor(r / 3600000), m = Math.floor((r % 3600000) / 60000); st = 'Bị cấm (' + h + 'h' + m + 'm)'; sc = "err"; ss = ""; }
            else { st = "Hoạt động"; sc = ""; ss = "background:var(--soft);color:var(--secondary)"; }
          } else { st = "Bị cấm"; sc = "err"; ss = ""; }
        }
        var srcBadge = u.id_server ? '<span style="font-size:.7rem;color:var(--muted);background:var(--soft);padding:2px 8px;border-radius:6px">Server</span>' : '<span style="font-size:.7rem;color:var(--muted);background:var(--soft);padding:2px 8px;border-radius:6px">Local</span>';
        return '<tr><td><strong>' + escapeHtml(u.username) + '</strong></td><td>' + escapeHtml(u.fullName || "—") + '</td><td>' + escapeHtml(u.email) + '</td><td>' + userOrders.length + '</td><td>' + money(spent) + '</td><td><span class="tag ' + sc + '" style="' + ss + '">' + st + stDetail + '</span></td><td>' + new Date(u.createdAt).toLocaleDateString() + '</td><td>' + srcBadge + '</td><td class="row-actions" style="white-space:nowrap">' +
          (u.banned
            ? '<button onclick="unbanUser(\'' + u.id + '\')" style="color:var(--primary)" title="Bỏ cấm / Khôi phục"><i class="fa-solid fa-unlock"></i></button>'
            : '<button onclick="showBanDialog(\'' + u.id + '\')" style="color:#f59e0b" title="Cấm"><i class="fa-solid fa-ban"></i></button>') +
          '<button onclick="confirmDeleteUser(\'' + u.id + '\')" style="color:#dc2626" title="Xóa"><i class="fa-solid fa-trash"></i></button>' +
        '</td></tr>';
      }).join('');
    }

    function saveNewPassword(id, username) {
      var newPass = $('#newPassInput').val().trim();
      if (!newPass || newPass.length < 6) { toast('Mật khẩu phải có ít nhất 6 ký tự', 'error'); return; }
      var u = DB.users.find(function(x) { return x.id === id; });
      if (u) { u.password = newPass; saveDB(); }
      $.ajax({
        url: '/api/users/change-password',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ id: id, password: newPass }),
        success: function() { toast('Đã đổi mật khẩu cho ' + escapeHtml(username), 'success'); closeModal('genericModal'); },
        error: function() { toast('Không thể đồng bộ lên server, nhưng đã lưu local', 'warn'); closeModal('genericModal'); }
      });
      renderServerAccounts();
    }

    function execBan(id) {
      const dur = window._banDuration;
      if (!dur || dur <= 0) return toast("Chọn thời gian cấm", "error");
      const reason = window._banReason;
      if (!reason) return toast("Chọn lý do cấm", "error");
      const u = DB.users.find(x => x.id === id);
      if (u) { u.banned = true; u.banType = "ban"; u.banMessage = reason; u.banExpiresAt = Date.now() + dur * 3600000; u.bannedAt = Date.now(); u.banReason = reason; }
      saveDB(); closeModal("genericModal");
      // Sync to server (dùng id_server nếu có)
      const serverId = u ? u.id_server || u.id : id;
      $.ajax({
        url: '/api/users/ban',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ id: serverId, durationHours: dur, message: reason, banReason: reason }),
        error: function() {}
      });
      const label = dur >= 24 ? `${dur/24} ngày` : `${dur} giờ`;
      toast(`Đã cấm ${label}: ${reason}`, "error"); renderAdmin();

    function cancelLocalVip(id) {
      if (!confirm('Xác nhận hủy tư cách VIP của người dùng này?')) return;
      var u = DB.users.find(function(x) { return x.id === id; });
      if (u) {
        u.membershipType = 'Thường';
        u.membershipPlan = null;
        u.membershipPlanName = null;
        u.membershipStartDate = null;
        u.membershipEndDate = null;
        u.membershipDiscount = 0;
        u.membershipFreeShipping = 0;
        if (DB.session && DB.session.id === id) {
          Object.assign(DB.session, { membershipType: 'Thường', membershipPlan: null, membershipPlanName: null, membershipStartDate: null, membershipEndDate: null, membershipDiscount: 0, membershipFreeShipping: 0 });
        }
        saveDB();
        toast('Đã hủy tư cách VIP', 'success');
        renderVipManagement();
      }
    }

    function extendLocalVip(id) {
      if (!confirm('Xác nhận gia hạn gói VIP thêm 30 ngày?')) return;
      var u = DB.users.find(function(x) { return x.id === id; });
      if (u) {
        var currentEnd = u.membershipEndDate ? new Date(u.membershipEndDate).getTime() : Date.now();
        var newEnd = new Date(currentEnd + 30 * 24 * 60 * 60 * 1000).toISOString();
        u.membershipEndDate = newEnd;
        if (!u.membershipType || u.membershipType === 'Thường') u.membershipType = 'VIP';
        if (DB.session && DB.session.id === id) {
          DB.session.membershipEndDate = newEnd;
          DB.session.membershipType = 'VIP';
        }
        saveDB();
        toast('Đã gia hạn gói VIP thêm 30 ngày', 'success');
        renderVipManagement();
      }
    }

    const slotColors = { hero: '#14532d', sidebar: '#2563eb', product: '#7c3aed', footer: '#6b7280' };
    function slotName(s) { return ({ hero:'Banner chính', sidebar:'Banner cột bên', product:'Banner SP', footer:'Banner chân' })[s] || s; }
    function slotBadge(s) { var c = slotColors[s] || '#6b7280'; return '<span class="tag" style="background:'+c+';color:#fff">'+slotName(s)+'</span>'; }
    function formatCurrency(n) { return '$' + Number(n || 0).toFixed(2); }

    function renderAdRequests() {
      var listHtml = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải...</td></tr>';
      var filterStatus = $('#adFilterStatus').val() || 'all';
      $.ajax({
        url: '/api/ad-campaigns',
        method: 'GET',
        dataType: 'json',
        success: function (data) {
          var list = data || [];
          var pendingCount = list.filter(function(r) { return r.status === 'pending'; }).length;
          var activeCount = list.filter(function(r) { return r.status === 'active'; }).length;
          var totalBudget = list.reduce(function(s, r) { return s + (r.totalBudget || 0); }, 0);
          var totalSpent = list.reduce(function(s, r) { return s + (r.spent || 0); }, 0);
          $('#pendingAdBadge').text(pendingCount);
          if (filterStatus !== 'all') {
            list = list.filter(function(r) { return r.status === filterStatus; });
          }
          if (list.length) {
            listHtml = list.slice().reverse().map(function(c) {
              var statusHtml = c.status === 'pending' ? '<span class="tag warn">Chờ duyệt</span>' :
                c.status === 'active' ? '<span class="tag" style="background:#dcfce7;color:#16a34a">Đang chạy</span>' :
                c.status === 'paused' ? '<span class="tag" style="background:#fef3c7;color:#92400e">Tạm dừng</span>' :
                c.status === 'completed' ? '<span class="tag" style="background:#dbeafe;color:#1e40af">Hoàn thành</span>' :
                '<span class="tag err">Từ chối</span>';
              var adminNote = c.adminNote ? '<br><span style="font-size:.75rem;color:var(--muted)">Ghi chú: ' + escapeHtml(c.adminNote) + '</span>' : '';
              var budgetHtml = formatCurrency(c.spent || 0) + ' / ' + formatCurrency(c.totalBudget || c.dailyBudget * 30);
              var timeHtml = c.startDate ? new Date(c.startDate).toLocaleDateString('vi-VN') : '—';
              if (c.endDate) timeHtml += ' → ' + new Date(c.endDate).toLocaleDateString('vi-VN');
              var thumbHtml = c.image && c.image.path ? '<img src="' + escapeHtml(c.image.path) + '" style="width:50px;height:50px;border-radius:8px;object-fit:cover;background:var(--soft)" onerror="this.style.display=\'none\'">' : '';
              var toggleBtn = (c.status === 'active' || c.status === 'paused')
                ? '<button onclick="toggleCampaign(\'' + c.id + '\')" style="color:' + (c.status === 'active' ? '#92400e' : 'var(--primary)') + '" title="' + (c.status === 'active' ? 'Tạm dừng' : 'Tiếp tục') + '"><i class="fa-solid fa-' + (c.status === 'active' ? 'pause' : 'play') + '"></i></button>'
                : '';
              return '<tr>' +
                '<td>' + thumbHtml + '</td>' +
                '<td><strong>' + escapeHtml(c.campaignName || c.id) + '</strong></td>' +
                '<td>' + escapeHtml(c.businessName || '—') + '</td>' +
                '<td>' + slotBadge(c.slotType) + '</td>' +
                '<td style="font-size:.82rem">' + budgetHtml + '</td>' +
                '<td style="font-size:.82rem;color:var(--muted)">' + timeHtml + '</td>' +
                '<td>' + statusHtml + adminNote + '</td>' +
                '<td class="row-actions" style="white-space:nowrap">' +
                  (c.status === 'pending'
                    ? '<button onclick="showApproveCampaignModal(\'' + c.id + '\')" style="color:#16a34a" title="Duyệt"><i class="fa-solid fa-check"></i></button>' +
                      '<button onclick="showRejectCampaignModal(\'' + c.id + '\')" style="color:#dc2626" title="Từ chối"><i class="fa-solid fa-xmark"></i></button>'
                    : '') +
                  toggleBtn +
                  '<button onclick="viewCampaign(\'' + c.id + '\')" title="Xem chi tiết"><i class="fa-solid fa-eye" style="color:var(--primary)"></i></button>' +
                '</td></tr>';
            }).join('');
          } else {
            listHtml = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Chưa có chiến dịch quảng cáo nào.</td></tr>';
          }
          $('#adRequestsBody').html(listHtml);
          $('#campaignTotalCount').text(list.length);
          $('#campaignActiveCount').text(activeCount);
          $('#campaignPendingCount').text(pendingCount);
          $('#campaignBudgetTotal').text(formatCurrency(totalBudget));
        },
        error: function () {
          $('#adRequestsBody').html('<tr><td colspan="8" style="text-align:center;padding:20px;color:#dc2626">Không thể kết nối server.</td></tr>');
        }
      });
      $("#adminMain").html(
        '<div class="admin-top">' +
          '<h2><i class="fa-solid fa-bullhorn" style="color:var(--primary)"></i> Chiến dịch quảng cáo</h2>' +

                  '<div><div style="font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px">Vị trí QC</div><div style="margin-top:2px">' + slotBadge(c.slotType) + '</div></div>' +

    function execApproveCampaign(id) {
      var note = $('#apr_note').val().trim();

        url: '/api/ad-campaigns/status',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ id: id, status: 'active', adminNote: note }),
        success: function () {
          toast('Đã duyệt chiến dịch quảng cáo!', 'success');
          closeModal('genericModal');

        url: '/api/ad-campaigns/status',
        method: 'POST',

        success: function () {

          closeModal('genericModal');

        error: function () { toast('Lỗi khi cập nhật', 'error'); }

      $('#pendingAppealBadge').text(pendingCount);
      var catColors = { 'Tôi không vi phạm': '#22c55e', 'Vi phạm nhẹ, xin cơ hội': '#f59e0b', 'Nhầm lẫn tài khoản': '#3b82f6', 'Đã khắc phục hậu quả': '#8b5cf6', 'Khác': '#6b7280' };

        '<div class="panel" style="overflow-x:auto">' +
        '<table class="table-eco" style="min-width:950px">' +
        '<thead><tr><th>Mã</th><th>Người dùng</th><th>Loại</th><th>Liên hệ</th><th>Nội dung</th><th>Ngày gửi</th><th>Trạng thái</th><th></th></tr></thead>' +
        '<tbody>' +

            '<span class="tag err">Từ chối</span>';

          var catColor = catColors[catLabel] || '#6b7280';
          var contentPreview = a.content.length > 60 ? escapeHtml(a.content.substring(0, 60)) + '...' : escapeHtml(a.content);
          return '<tr>' +
            '<td><strong>' + escapeHtml(a.id) + '</strong></td>' +
            '<td>' + escapeHtml(a.fullName || a.username || a.userId) + '</td>' +
            '<td><span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:700;color:#fff;background:' + catColor + '">' + escapeHtml(catLabel) + '</span></td>' +
            '<td style="font-size:.82rem">' + escapeHtml(a.contact || '—') + '</td>' +
            '<td style="font-size:.82rem;max-width:220px">' + contentPreview + '</td>' +
            '<td style="font-size:.82rem;color:var(--muted)">' + new Date(a.createdAt).toLocaleString('vi-VN') + '</td>' +
            '<td>' + statusHtml + '</td>' +
            '<td class="row-actions">' +
            '<button onclick="viewAppeal(\'' + a.id + '\')" title="Xem chi tiết"><i class="fa-solid fa-eye" style="color:var(--primary)"></i></button>' +

              '<button onclick="resolveAppeal(\'' + a.id + '\',\'rejected\')" title="Từ chối"><i class="fa-solid fa-xmark" style="color:#dc2626"></i></button>'
            : '') +
            '</td></tr>';
        }).join('') : '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Chưa có khiếu nại nào.</td></tr>') +
        '</tbody></table></div>'

    function resolveAppeal(id, status) {
      var a = (DB.appeals || []).find(function(x) { return x.id === id; });
      if (!a) return;
      a.status = status;
      a.resolvedAt = Date.now();
      saveDB();
      if (status === 'resolved') {

    function resolveReport(id, status) {
      var r = (DB.reports || []).find(function(x) { return x.id === id; });
      if (!r) return;
      r.status = status === 'resolved_delete' ? 'resolved' : status;
      r.resolvedAt = Date.now();
      saveDB();
      // Handle listing-specific actions
      if (r.type === 'listing' && r.itemId) {
        var reportedListing = (DB.listings || []).find(function(l) { return l.id === r.itemId; });
        if (status === 'resolved_delete' && reportedListing) {
          DB.listings = DB.listings.filter(function(l) { return l.id !== r.itemId; });
          r.adminNote = (r.adminNote ? r.adminNote + ' | ' : '') + 'Đã xóa sản phẩm khỏi chợ';
          saveDB();
        }
      }
      // Warn the reported user
      var reportedUser = DB.users.find(function(x) { return x.id === r.reportedUserId; });
      if (reportedUser && (status === 'resolved' || status === 'resolved_delete')) {
        if (!reportedUser.reportCount) reportedUser.reportCount = 0;
        reportedUser.reportCount++;
        reportedUser.lastWarning = 'Vi phạm: ' + (r.reason || 'không xác định') + ' - ' + new Date().toLocaleString('vi-VN');
        saveDB();
        // Send notification to seller
        var reasonLabel = { fake_product: 'Hàng giả, hàng nhái', wrong_desc: 'Mô tả sai lệch', no_delivery: 'Không giao hàng', damaged: 'Hàng hư hỏng', overpriced: 'Định giá quá cao', prohibited: 'Sản phẩm bị cấm', impersonation: 'Giả mạo thương hiệu' };
        var rl = reasonLabel[r.reason] || r.reason || 'không xác định';
        var notif = {
          id: 'NOTIF-' + Date.now() + Math.floor(Math.random() * 1000),
          type: status === 'resolved_delete' ? 'listing_deleted' : 'warning',
          title: status === 'resolved_delete' ? 'Sản phẩm đã bị xóa khỏi chợ' : 'Cảnh cáo từ Admin',
          body: 'Lý do: ' + rl + (r.content ? ' - ' + r.content : '') + (status === 'resolved_delete' && r.itemName ? ' | Sản phẩm: ' + r.itemName : ''),
          createdAt: Date.now(),
          read: false
        };
        if (!DB.notifications) DB.notifications = {};
        if (!DB.notifications[r.reportedUserId]) DB.notifications[r.reportedUserId] = [];
        DB.notifications[r.reportedUserId].push(notif);
        saveDB();
      }
      if (status === 'resolved' || status === 'resolved_delete') {
        toast(status === 'resolved_delete' ? 'Đã xóa sản phẩm và cảnh cáo người bán' : 'Đã xác nhận xử lý báo cáo', 'success');
      } else {
        toast('Đã từ chối báo cáo', 'warn');
      }
      renderReports();
    }

      <div class="input-eco" style="margin-top:14px"><input id="set_tax" type="number" step="0.01" value="${DB.settings.taxRate}" placeholder=" "><label>Thuế suất (0-1)</label></div>
      <div class="input-eco"><input id="set_ship" type="number" value="${DB.settings.freeShippingOver}" placeholder=" "><label>Miễn phí ship trên ($)</label></div>

    }

    function renderPromoCodes() {
      const list = DB.promoCodes || [];
      const now = Date.now();
      $("#adminMain").html(`<div class="admin-top"><h2>Mã giảm giá</h2>
        <button class="btn-eco" onclick="editPromo()"><i class="fa-solid fa-plus"></i> Thêm mã</button></div>
      <div class="panel"><table class="table-eco"><thead><tr><th>Mã</th><th>Giảm</th><th>Hết hạn</th><th>Đã dùng / Giới hạn</th><th>Trạng thái</th><th></th></tr></thead>

      }).join("") || '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Chưa có mã giảm giá nào.</td></tr>'}</tbody></table></div>`);

    function editPromo(code) {
      const pc = code ? (DB.promoCodes || []).find(p => p.code === code) : null;
      const d = pc || { code: "", discountRate: 10, expiresAt: Date.now() + 86400000 * 30, usageLimit: 100, usedCount: 0 };
      $("#genericBody").html(`<h4 style="font-weight:800">${pc ? "Sửa" : "Thêm"} mã giảm giá</h4>
      <div class="input-eco" style="margin-top:10px"><input id="pm_code" value="${escapeHtml(d.code)}" placeholder=" "><label>Mã giảm giá</label></div>
      <div class="input-eco"><input id="pm_rate" type="number" step="1" value="${Math.round(d.discountRate * 100)}" placeholder=" "><label>% giảm (0-100)</label></div>
      <div class="input-eco"><input id="pm_limit" type="number" value="${d.usageLimit}" placeholder=" "><label>Giới hạn lượt dùng</label></div>
      <div class="input-eco"><input id="pm_expires" type="date" value="${new Date(d.expiresAt).toISOString().split("T")[0]}" placeholder=" "><label>Ngày hết hạn</label></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn-ghost" onclick="closeModal('genericModal')">Hủy</button><button class="btn-eco" onclick="savePromo('${escapeHtml(code || "")}')">Lưu</button></div>`);
      openModal("genericModal");

    function savePromo(code) {
      const codeVal = $("#pm_code").val().trim().toUpperCase();
      if (!codeVal) return toast("Nhập mã giảm giá", "error");
      const rate = parseInt($("#pm_rate").val()) || 0;
      if (rate <= 0 || rate > 100) return toast("% giảm từ 1-100", "error");
      const limit = parseInt($("#pm_limit").val()) || 0;
      if (limit <= 0) return toast("Giới hạn lượt dùng phải > 0", "error");
      const expires = new Date($("#pm_expires").val());
      if (isNaN(expires.getTime())) return toast("Chọn ngày hết hạn", "error");
      const data = { code: codeVal, discountRate: rate / 100, expiresAt: expires.getTime(), usageLimit: limit, usedCount: 0 };
      if (code) {
        const idx = (DB.promoCodes || []).findIndex(p => p.code === code);
        if (idx > -1) { data.usedCount = DB.promoCodes[idx].usedCount; DB.promoCodes[idx] = { ...DB.promoCodes[idx], ...data }; }
      } else {
        if (!DB.promoCodes) DB.promoCodes = [];
        if (DB.promoCodes.find(p => p.code === codeVal)) return toast("Mã đã tồn tại", "error");
        DB.promoCodes.push(data);
      }
      saveDB(); closeModal("genericModal"); toast("Đã lưu mã giảm giá", "success"); renderPromoCodes();
    }

      openModal("genericModal");
    }

            <td>${statusLabel[l.status] || ""}</td>
            <td>${new Date(l.createdAt).toLocaleDateString()}</td>
            <td class="row-actions" style="white-space:nowrap">
              ${l.status === "pending" ? `<button onclick="approveListing('${l.id}')" style="color:var(--primary)" title="Duyệt"><i class="fa-solid fa-check"></i></button><button onclick="rejectListing('${l.id}')" style="color:#dc2626" title="Từ chối"><i class="fa-solid fa-xmark"></i></button>` : ""}
              ${l.adminNote ? `<button onclick="toast('Lý do: ${escapeHtml(l.adminNote)}','info',5000)" title="Xem ghi chú"><i class="fa-solid fa-note-sticky"></i></button>` : ""}
            </td></tr>`;
        }).join("") : '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">Chưa có sản phẩm ký gửi nào.</td></tr>'}</tbody></table></div>`);
      // set filter select value
      $("#listingFilter").val(filter);
    }

    function approveListing(id) {
      updateItem("listings", id, { status: "approved" });
      toast("Đã duyệt sản phẩm", "success");
      renderListings();
    }

    function rejectListing(id) {
      const l = getItem("listings", id);
      if (!l) return;
      $("#genericBody").html(`<h4 style="font-weight:800">Từ chối sản phẩm</h4>
        <p style="color:var(--muted);margin:8px 0">Sản phẩm: <strong>${escapeHtml(l.title)}</strong></p>
        <div class="input-eco" style="margin-top:10px"><input id="rejectReason" placeholder=" "><label>Lý do từ chối</label></div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn-ghost" onclick="closeModal('genericModal')">Hủy</button><button class="btn-eco" style="background:#dc2626" onclick="execRejectListing('${id}')">Xác nhận từ chối</button></div>`);
      openModal("genericModal");
    }

    function execRejectListing(id) {
      const reason = $("#rejectReason").val().trim();
      if (!reason) return toast("Vui lòng nhập lý do từ chối", "error");
      updateItem("listings", id, { status: "rejected", adminNote: reason });
      closeModal("genericModal");
      toast("Đã từ chối sản phẩm", "warn");
      renderListings();
    }



    let serverWithdrawals = [];
    var wdTab = 'pending';
    var wdPollTimer = null;

    function switchWdTab(tab) {
      wdTab = tab;
      renderWithdrawals();
    }

    function startWdPoll() {
      if (wdPollTimer) clearInterval(wdPollTimer);
      wdPollTimer = setInterval(function() {
        var raw = localStorage.getItem('eco_pending_withdrawals') || '[]';
        var serverRaw = localStorage.getItem('eco_server_withdrawals');
        if (serverRaw) { try { serverWithdrawals = JSON.parse(serverRaw); } catch(e) {} }
        $.ajax({
          url: '/api/withdrawals',
          method: 'GET',
          dataType: 'json',
          success: function(data) {
            if (data && data.length) {
              serverWithdrawals = data;
              try { localStorage.setItem('eco_server_withdrawals', JSON.stringify(data)); } catch(e) {}
            }
          },
          error: function() {}
        });
        renderWithdrawals();
      }, 5000);
    }

    function stopWdPoll() {
      if (wdPollTimer) { clearInterval(wdPollTimer); wdPollTimer = null; }
    }

            '<button class="btn-ghost" onclick="renderWithdrawals()" style="font-size:.85rem;padding:9px 14px"><i class="fa-solid fa-rotate"></i> L\u00e0m m\u1edbi</button>' +
          '</div>' +

        '<div class="wd-tabs" style="display:flex;gap:0;margin-bottom:16px;background:var(--bg);border-radius:12px;padding:3px;border:1px solid var(--border)">' +
          '<div class="wd-tab' + (wdTab === 'pending' ? ' active' : '') + '" onclick="switchWdTab(\'pending\')" style="flex:1;padding:9px 16px;text-align:center;font-weight:700;font-size:.82rem;border-radius:10px;cursor:pointer;transition:all .2s;' + (wdTab === 'pending' ? 'background:var(--card);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05)' : 'color:var(--muted)') + '">' +
            '<i class="fa-solid fa-clock"></i> Ch\u1edd duy\u1ec7t ' + (pendingCount ? '<span style="display:inline-block;background:#f59e0b;color:#fff;font-size:.7rem;padding:1px 8px;border-radius:10px;margin-left:4px">' + pendingCount + '</span>' : '') +
          '</div>' +
          '<div class="wd-tab' + (wdTab === 'payment' ? ' active' : '') + '" onclick="switchWdTab(\'payment\')" style="flex:1;padding:9px 16px;text-align:center;font-weight:700;font-size:.82rem;border-radius:10px;cursor:pointer;transition:all .2s;' + (wdTab === 'payment' ? 'background:var(--card);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05)' : 'color:var(--muted)') + '">' +
            '<i class="fa-solid fa-coins"></i> Ch\u1edd thanh to\u00e1n ' + (payCount ? '<span style="display:inline-block;background:#2563eb;color:#fff;font-size:.7rem;padding:1px 8px;border-radius:10px;margin-left:4px">' + payCount + '</span>' : '') +
          '</div>' +
          '<div class="wd-tab' + (wdTab === 'history' ? ' active' : '') + '" onclick="switchWdTab(\'history\')" style="flex:1;padding:9px 16px;text-align:center;font-weight:700;font-size:.82rem;border-radius:10px;cursor:pointer;transition:all .2s;' + (wdTab === 'history' ? 'background:var(--card);color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.05)' : 'color:var(--muted)') + '">' +

                      '<button onclick="rejectWithdrawal(\'' + w.id + '\',\'' + w.source + '\')" style="color:#dc2626" title="T\u1eeb ch\u1ed1i"><i class="fa-solid fa-xmark"></i> T\u1eeb ch\u1ed1i</button>'

              );}).join('') : '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">' +

    function updateLocalWithdrawal(id, updates) {
      const raw = localStorage.getItem('eco_pending_withdrawals') || '[]';
      let list = JSON.parse(raw);
      const idx = list.findIndex(w => w.id === id);
      if (idx > -1) { Object.assign(list[idx], updates); localStorage.setItem('eco_pending_withdrawals', JSON.stringify(list)); }
      return list[idx];
    }

    function approveWithdrawal(id, source) {
      var req = updateLocalWithdrawal(id, { status: 'Đã duyệt' });
      if (req) {
        var dbKey = 'ecoshop_db_v1';
        var dbRaw = localStorage.getItem(dbKey);
        if (dbRaw) {
          try {
            var DB = JSON.parse(dbRaw);
            if (!DB.notifications) DB.notifications = {};
            if (!DB.notifications[req.userId]) DB.notifications[req.userId] = [];
            DB.notifications[req.userId].push({
              id: 'NOTIF-' + Date.now() + Math.floor(Math.random() * 1000),
              type: 'withdrawal_approved',
              title: 'Yêu cầu rút tiền đã được duyệt',
              body: 'Yêu cầu rút ' + money(req.amount) + ' đã được admin phê duyệt và đang chờ thanh toán.',
              requestId: req.id,
              amount: req.amount,
              createdAt: Date.now(),
              read: false
            });
            localStorage.setItem(dbKey, JSON.stringify(DB));
          } catch(e) {}
        }
      }
      if (source === 'server') {
        $.ajax({
          url: '/api/withdrawals/status',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ id, status: 'Đã duyệt' }),
          error: function() { console.warn('Lỗi đồng bộ server'); }
        });
      }
      toast('Đã phê duyệt, chuyển sang mục thanh toán', 'success');
      wdTab = 'payment';
      renderWithdrawals();
      try { if (Notification.permission === 'granted') new Notification('EcoShop - Phê duyệt rút tiền', { body: 'Yêu cầu ' + id + ' đã được duyệt, chờ thanh toán.', icon: 'https://cdn-icons-png.flaticon.com/128/1828/1828640.png' }); } catch(e) {}
    }

    function deductWallet(wd) {
      const dbKey = 'ecoshop_db_v1';
      const dbRaw = localStorage.getItem(dbKey);
      if (!dbRaw) return;
      try {
        const DB = JSON.parse(dbRaw);
        if (!DB.wallets) DB.wallets = {};
        if (!DB.wallets[wd.userId]) DB.wallets[wd.userId] = { balance: 0, transactions: [] };
        const wallet = DB.wallets[wd.userId];
        wallet.balance = (wallet.balance || 0) - wd.amount;
        if (!wallet.transactions) wallet.transactions = [];
        wallet.transactions.push({
          id: 'TXN-' + Date.now() + Math.floor(Math.random() * 1000),
          type: 'withdrawal',
          amount: -wd.amount,
          method: wd.method,
          note: 'Rút tiền - ' + wd.id + (wd.fee ? ' (Phí: $' + Number(wd.fee).toFixed(2) + ')' : ''),
          createdAt: Date.now()
        });
        localStorage.setItem(dbKey, JSON.stringify(DB));
      } catch(e) { console.warn('Lỗi trừ tiền ví:', e); }
    }

    function processPayment(id, source) {
      if (!confirm('Xác nhận đã chuyển tiền cho yêu cầu này?')) return;
      const wd = updateLocalWithdrawal(id, { status: 'Đã thanh toán' });
      if (wd) {
        deductWallet(wd);
        var dbKey = 'ecoshop_db_v1';
        var dbRaw = localStorage.getItem(dbKey);
        if (dbRaw) {
          try {
            var DB = JSON.parse(dbRaw);
            if (!DB.notifications) DB.notifications = {};
            if (!DB.notifications[wd.userId]) DB.notifications[wd.userId] = [];
            DB.notifications[wd.userId].push({
              id: 'NOTIF-' + Date.now() + Math.floor(Math.random() * 1000),
              type: 'withdrawal_paid',
              title: 'Yêu cầu rút tiền đã được thanh toán',
              body: 'Yêu cầu rút ' + money(wd.amount) + ' đã được admin thanh toán thành công.',
              requestId: wd.id,
              amount: wd.amount,
              createdAt: Date.now(),
              read: false
            });
            localStorage.setItem(dbKey, JSON.stringify(DB));
          } catch(e) {}
        }
      }
      if (source === 'server') {
        $.ajax({
          url: '/api/withdrawals/status',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ id, status: 'Đã thanh toán' }),
          error: function() { console.warn('Lỗi đồng bộ server'); }
        });
      }
      toast('Đã thanh toán thành công', 'success');
      renderWithdrawals();
      try { if (Notification.permission === 'granted') new Notification('EcoShop - Thanh toán rút tiền', { body: 'Đã thanh toán ' + id + ' thành công.', icon: 'https://cdn-icons-png.flaticon.com/128/1828/1828640.png' }); } catch(e) {}
    }

    function rejectWithdrawal(id, source) {
      const refundDelay = 30000 + Math.floor(Math.random() * 30000);
      const refundData = { status: 'Từ chối', rejectedAt: Date.now(), refundDelay: refundDelay, refundStatus: 'pending' };
      var req = updateLocalWithdrawal(id, refundData);
      if (req) {
        var dbKey = 'ecoshop_db_v1';
        var dbRaw = localStorage.getItem(dbKey);
        if (dbRaw) {
          try {
            var DB = JSON.parse(dbRaw);
            if (!DB.notifications) DB.notifications = {};
            if (!DB.notifications[req.userId]) DB.notifications[req.userId] = [];
            DB.notifications[req.userId].push({
              id: 'NOTIF-' + Date.now() + Math.floor(Math.random() * 1000),
              type: 'withdrawal_rejected',
              title: 'Yêu cầu rút tiền bị từ chối',
              body: 'Yêu cầu rút ' + money(req.amount) + ' đã bị admin từ chối. Tiền sẽ tự động hoàn lại trong 30-60 giây.',
              requestId: req.id,
              amount: req.amount,
              createdAt: Date.now(),
              read: false
            });
            localStorage.setItem(dbKey, JSON.stringify(DB));
          } catch(e) {}
        }
      }
      if (source === 'server') {
        $.ajax({
          url: '/api/withdrawals/status',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ id, status: 'Từ chối' }),
          error: function() { console.warn('Lỗi đồng bộ server'); }
        });
      }
      toast('Đã từ chối - Tiền sẽ tự động hoàn lại trong 30-60 giây', 'warn');
      renderWithdrawals();
      try { if (Notification.permission === 'granted') new Notification('EcoShop - Từ chối rút tiền', { body: 'Yêu cầu ' + id + ' đã bị từ chối.', icon: 'https://cdn-icons-png.flaticon.com/128/1828/1828640.png' }); } catch(e) {}
    }

    function renderTickets() {
      $("#adminMain").html(`<div class="admin-top"><h2>Phiếu hỗ trợ</h2></div>
    <div class="panel"><table class="table-eco"><thead><tr><th>Mã phiếu</th><th>Họ tên</th><th>Liên hệ</th><th>Tiêu đề</th><th>Mức độ</th><th>Trạng thái</th><th>Ngày gửi</th><th></th></tr></thead>
    <tbody id="ticketsBody"><tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">Đang tải...</td></tr></tbody></table></div>`);
      loadTickets();
    }

    function loadTickets() {
      $.ajax({
        url: '/api/tickets',
        method: 'GET',
        dataType: 'json',
        success: function (data) {
          const labels = { pending: 'Chưa xử lý', processing: 'Đang xử lý', done: 'Đã hoàn thành' };
          const colors = { pending: 'warn', processing: 'info', done: '' };
          const urgencyLabels = { low: 'Thấp', medium: 'Trung bình', high: 'Cao' };
          const urgencyColors = { low: '', medium: 'warn', high: 'err' };
          const pendingCount = data.filter(t => t.status === 'pending').length;
          $("#pendingTicketsBadge").text(pendingCount);
          if (data && data.length) {
            const rows = data.slice().reverse().map(t => {
              const d = new Date(t.createdAt);
              const dateStr = d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN');
              return `<tr>
                <td><strong>${escapeHtml(t.id)}</strong></td>
                <td>${escapeHtml(t.fullName)}</td>
                <td>${escapeHtml(t.contact)}</td>
                <td>${escapeHtml(t.title)}</td>
                <td><span class="tag ${urgencyColors[t.urgency] || ''}">${urgencyLabels[t.urgency] || t.urgency}</span></td>
                <td><select class="form-select-eco" onchange="updateTicketStatus('${t.id}',this.value)">${['pending','processing','done'].map(s => `<option value="${s}" ${t.status === s ? 'selected' : ''}>${labels[s]}</option>`).join('')}</select></td>
                <td>${dateStr}</td>
                <td class="row-actions"><button onclick="viewTicket('${t.id}')" style="color:var(--primary)" title="Xem chi tiết"><i class="fa-solid fa-eye"></i></button></td>
              </tr>`;
            }).join('');
            $('#ticketsBody').html(rows);
          } else {
            $('#ticketsBody').html('<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px">Chưa có phiếu hỗ trợ nào.</td></tr>');
          }
        },
        error: function () {
          $('#ticketsBody').html('<tr><td colspan="8" style="text-align:center;color:#dc2626;padding:20px">Không thể kết nối server.</td></tr>');
        }
      });
    }

    function updateTicketStatus(id, status) {
      $.ajax({
        url: '/api/tickets/status',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ id, status }),
        success: function () { toast('Đã cập nhật trạng thái phiếu', 'success'); loadTickets(); },
        error: function () { toast('Lỗi cập nhật', 'error'); }
      });
    }

    function viewTicket(id) {
      $.ajax({
        url: '/api/tickets',
        method: 'GET',
        dataType: 'json',
        success: function (data) {
          const t = data.find(x => x.id === id);
          if (!t) return toast('Không tìm thấy phiếu', 'error');
          const d = new Date(t.createdAt);
          const labels = { pending: 'Chưa xử lý', processing: 'Đang xử lý', done: 'Đã hoàn thành' };
          const urgencyLabels = { low: 'Thấp', medium: 'Trung bình', high: 'Cao' };
          const filesHtml = (t.files && t.files.length)
            ? t.files.map(f => {
                const isImg = /\.(png|jpg|jpeg|gif|webp)$/i.test(f.fileName);
                return isImg
                  ? `<a href="${f.path}" target="_blank" style="display:inline-block;width:80px;height:80px;border-radius:10px;overflow:hidden;border:1px solid var(--border)"><img src="${f.path}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></a>`
                  : `<a href="${f.path}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--soft);color:var(--text);text-decoration:none;font-size:.85rem"><i class="fa-solid fa-video"></i> ${escapeHtml(f.originalName || f.fileName)}</a>`;
              }).join('')
            : '<span style="color:var(--muted)">Không có file đính kèm</span>';
          $("#genericBody").html(`<h4 style="font-weight:800">Chi tiết phiếu hỗ trợ</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;font-size:.95rem">
              <div><strong>Mã phiếu:</strong><br>${escapeHtml(t.id)}</div>
              <div><strong>Trạng thái:</strong><br>${labels[t.status] || t.status}</div>
              <div><strong>Họ tên:</strong><br>${escapeHtml(t.fullName)}</div>
              <div><strong>Liên hệ:</strong><br>${escapeHtml(t.contact)}</div>
              <div><strong>Tiêu đề:</strong><br>${escapeHtml(t.title)}</div>
              <div><strong>Mức độ:</strong><br>${urgencyLabels[t.urgency] || t.urgency}</div>
              <div style="grid-column:1/-1"><strong>Nội dung:</strong><br>${escapeHtml(t.content)}</div>
              <div style="grid-column:1/-1"><strong>File đính kèm:</strong><br><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">${filesHtml}</div></div>
              <div style="grid-column:1/-1"><strong>Ngày gửi:</strong><br>${d.toLocaleString('vi-VN')}</div>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
              <button class="btn-ghost" onclick="closeModal('genericModal')">Đóng</button>
            </div>`);
          openModal("genericModal");
        },
        error: function () { toast('Không thể kết nối server', 'error'); }
      });
    }

    let chatPollTimer = null;

    function renderChat() {
      $("#adminMain").html(`<div class="admin-top"><h2>Hộp thư trực tiếp</h2></div>
    <div class="panel" id="chatConversationsList"><div style="text-align:center;color:var(--muted);padding:20px">Đang tải...</div></div>
    <div id="chatDetailPanel" style="display:none">
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h5 style="font-weight:800;margin:0" id="chatDetailTitle">Hội thoại</h5>
          <button class="btn-ghost" onclick="closeChatDetail()" style="font-size:.85rem">← Quay lại</button>
        </div>
        <div id="chatDetailMessages" style="height:400px;overflow-y:auto;background:var(--bg);border-radius:12px;padding:14px;border:1px solid var(--border)"></div>
        <div id="chatTemplates" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
          <span style="font-size:.75rem;color:var(--muted);align-self:center">Mẫu:</span>
          <span class="chat-template" onclick="useTemplate(this)">Xin chào, tôi có thể giúp gì cho bạn?</span>
          <span class="chat-template" onclick="useTemplate(this)">Cảm ơn bạn đã liên hệ! Chúng tôi sẽ xử lý ngay.</span>
          <span class="chat-template" onclick="useTemplate(this)">Vui lòng cung cấp thêm thông tin về đơn hàng.</span>
          <span class="chat-template" onclick="useTemplate(this)">Chúng tôi đã ghi nhận yêu cầu và sẽ phản hồi sớm.</span>
          <span class="chat-template" onclick="useTemplate(this)">Rất tiếc về sự bất tiện này. Chúng tôi sẽ khắc phục ngay.</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="chatAdminInput" type="text" placeholder="Nhập tin nhắn trả lời..." style="flex:1;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none;font-size:.9rem" onkeydown="if(event.key==='Enter') sendAdminReply()">
          <button onclick="sendAdminReply()" style="padding:10px 18px;border-radius:12px;background:var(--grad);color:#fff;border:none;cursor:pointer;font-weight:700">Gửi</button>
        </div>
      </div>
    </div>`);
      loadConversations();
      startChatPoll();
    }

    let seenConversations = {};

    function loadConversations() {
      $.ajax({
        url: '/api/chat/conversations',
        method: 'GET',
        dataType: 'json',
        success: function (data) {
          let newCount = 0;
          const waitingCount = data.filter(c => c.status === 'waiting_admin').length;
          data.forEach(c => {
            const msgCount = c.messageCount || 0;
            if (!seenConversations[c.id]) {
              seenConversations[c.id] = msgCount;
              if (c.status === 'waiting_admin') newCount++;
            } else if (msgCount > seenConversations[c.id]) {
              if (c.status === 'waiting_admin') newCount += msgCount - seenConversations[c.id];
              seenConversations[c.id] = msgCount;
            }
          });
          const badgeCount = waitingCount || newCount || data.length;
          $("#chatBadge").text(badgeCount).toggle(badgeCount > 0);
          if (data.length) {
            const statusLabel = { active: 'Mới', bot_replied: 'Đã trả lời', waiting_admin: 'Chờ CSKH', closed: 'Đã đóng' };
            const statusColor = { active: '#2563eb', bot_replied: '#f59e0b', waiting_admin: '#dc2626', closed: '#6b7280' };
            const html = data.map(c => {
              const lastMsg = c.lastMessage;
              const preview = lastMsg ? lastMsg.message.slice(0, 60) + (lastMsg.message.length > 60 ? '...' : '') : 'Chưa có tin nhắn';
              const time = new Date(c.createdAt).toLocaleString('vi-VN');
              const st = c.status || 'active';
              const isNew = seenConversations[c.id] === (c.messageCount || 0) && !window._chatOpenedConv;
              const highlight = (st === 'waiting_admin' || isNew) ? 'border-left:4px solid var(--primary);' : '';
              return `<div class="panel" style="cursor:pointer;padding:14px;margin-bottom:8px;${highlight}" onclick="openConversation('${c.id}')">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div><strong>${escapeHtml(c.userName || 'Khách')}</strong> <small style="color:var(--muted)">(${escapeHtml(c.userEmail || '—')})</small></div>
                  <small><span style="background:${statusColor[st]};color:#fff;font-size:.65rem;padding:2px 8px;border-radius:8px;font-weight:700">${statusLabel[st] || st}</span> · ${time}</small>
                </div>
                <div style="color:var(--muted);font-size:.85rem;margin-top:4px">${escapeHtml(preview)}</div>
                <div style="font-size:.78rem;color:var(--primary);margin-top:4px">${c.messageCount || 0} tin nhắn</div>
              </div>`;
            }).join('');
            $('#chatConversationsList').html(html);
          } else {
            $('#chatConversationsList').html('<div class="panel" style="text-align:center;padding:40px;color:var(--muted)">Chưa có cuộc trò chuyện nào.</div>');
          }
        },
        error: function () {
          $('#chatConversationsList').html('<div class="panel" style="text-align:center;padding:20px;color:#dc2626">Không thể kết nối server.</div>');
        }
      });
    }

    let currentConvId = null;

    function openConversation(convId) {
      currentConvId = convId;
      $("#chatConversationsList").hide();
      $("#chatDetailPanel").show();
      $("#chatDetailTitle").text('Hội thoại: ' + convId);
      loadMessages(convId);
    }

    function closeChatDetail() {
      currentConvId = null;
      $("#chatDetailPanel").hide();
      $("#chatConversationsList").show();
    }

    function loadMessages(convId) {
      $.ajax({
        url: '/api/chat/messages?convId=' + encodeURIComponent(convId),
        method: 'GET',
        dataType: 'json',
        success: function (msgs) {
          const filtered = msgs.filter(m => !m.message.startsWith('__'));
          if (filtered.length) {
            const html = filtered.map(m => {
              const time = new Date(m.createdAt).toLocaleTimeString('vi-VN');
              const side = m.sender === 'admin' ? 'admin' : (m.sender === 'bot' ? 'bot' : 'user');
              const align = side === 'admin' || side === 'bot' ? 'flex-start' : 'flex-end';
              const bg = side === 'admin' ? 'var(--card)' : side === 'bot' ? 'var(--soft)' : 'var(--grad)';
              const color = side === 'user' ? '#fff' : 'var(--text)';
              const borderStyle = side === 'admin' ? 'border:1px solid var(--border)' : (side === 'bot' ? 'border:1px solid var(--glow);font-style:italic' : '');
              return `<div style="display:flex;flex-direction:column;align-items:${align};margin-bottom:10px">
                <div style="max-width:80%;padding:10px 14px;border-radius:16px;font-size:.88rem;background:${bg};color:${color};${borderStyle};border-bottom-${align === 'flex-start' ? 'left' : 'right'}-radius:4px;word-break:break-word">${escapeHtml(m.message)}</div>
                <div style="font-size:.68rem;color:var(--muted);margin-top:2px;padding:0 4px">${escapeHtml(m.userName || (side === 'admin' ? 'Admin' : side === 'bot' ? 'EcoBot' : 'Khách'))} · ${time}</div>
              </div>`;
            }).join('');
            $('#chatDetailMessages').html(html);
            $('#chatDetailMessages').scrollTop($('#chatDetailMessages')[0].scrollHeight);
          } else {
            $('#chatDetailMessages').html('<div style="text-align:center;color:var(--muted);padding:30px">Chưa có tin nhắn.</div>');
          }
        },
        error: function () { toast('Lỗi tải tin nhắn', 'error'); }
      });
    }

    function useTemplate(el) {
      $("#chatAdminInput").val($(el).text()).focus();
    }

    function sendAdminReply() {
      const msg = $("#chatAdminInput").val().trim();
      if (!msg || !currentConvId) return;
      $("#chatAdminInput").val('');
      $.ajax({
        url: '/api/chat/reply',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ convId: currentConvId, message: msg }),
        success: function () { loadMessages(currentConvId); },
        error: function () { toast('Lỗi gửi tin nhắn', 'error'); }
      });
    }

    function renderReviews() {
      var reviews = DB.reviews || [];
      var productMap = {};
      (DB.products || []).forEach(function(p) { productMap[p.id] = p; });
      var userMap = {};
      (DB.users || []).forEach(function(u) { userMap[u.id] = u; });
      var pendingCount = 0;
      var rows = reviews.map(function(r) {
        var p = productMap[r.productId] || {};
        var u = userMap[r.userId] || {};
        var dateStr = new Date(r.createdAt).toLocaleDateString('vi-VN');
        var stars = '';
        for (var i = 0; i < 5; i++) { stars += i < r.rating ? '<i class="fa-solid fa-star" style="color:#f59e0b;font-size:.78rem"></i>' : '<i class="fa-regular fa-star" style="color:#ccc;font-size:.78rem"></i>'; }
        return '<tr>' +
          '<td>' + escapeHtml(r.id) + '</td>' +
          '<td>' + escapeHtml(r.userName || u.fullName || '—') + '</td>' +
          '<td>' + stars + '</td>' +
          '<td>' + escapeHtml(r.suggestion || '—') + '</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(r.comment || '—') + '</td>' +
          '<td>' + escapeHtml(p.name || '—') + '</td>' +
          '<td>' + dateStr + '</td>' +
          '<td class="row-actions"><button onclick="viewReview(\'' + r.id + '\')" title="Xem chi tiết"><i class="fa-solid fa-eye"></i></button></td>' +
        '</tr>';
      }).join('');
      if (reviews.length) pendingCount = reviews.length;
      $("#adminMain").html('<div class="admin-top"><h2><i class="fa-solid fa-star" style="color:#f59e0b"></i> Đánh giá sản phẩm</h2></div>' +
        '<div class="panel"><table class="table-eco"><thead><tr>' +
        '<th>Mã đánh giá</th><th>Người dùng</th><th>Đánh giá</th><th>Gợi ý</th><th>Nhận xét</th><th>Sản phẩm</th><th>Ngày</th><th></th>' +
        '</tr></thead><tbody>' + (rows || '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:20px">Chưa có đánh giá nào.</td></tr>') + '</tbody></table></div>');
      $("#reviewsBadge").text(pendingCount || '0');
    }

    function viewReview(id) {
      var r = (DB.reviews || []).find(function(x) { return x.id === id; });
      if (!r) return;
      var productMap = {};
      (DB.products || []).forEach(function(p) { productMap[p.id] = p; });
      var p = productMap[r.productId] || {};
      var stars = '';
      for (var i = 0; i < 5; i++) { stars += i < r.rating ? '<i class="fa-solid fa-star" style="color:#f59e0b"></i>' : '<i class="fa-regular fa-star" style="color:#ccc"></i>'; }
      var mediaHtml = '';
      if (r.media && r.media.length) {
        mediaHtml = '<div style="margin-top:12px"><strong>Ảnh/Video:</strong><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">' +
          r.media.map(function(m) {
            return m.startsWith('data:video')
              ? '<video src="' + m + '" controls style="width:120px;height:120px;border-radius:10px;object-fit:cover;border:1px solid var(--border)"></video>'
              : '<img src="' + m + '" style="width:120px;height:120px;border-radius:10px;object-fit:cover;border:1px solid var(--border);cursor:pointer" onclick="window.open(\'' + m + '\')">';
          }).join('') + '</div></div>';
      }
      $("#genericBody").html('<div style="max-width:600px">' +
        '<h4 style="font-weight:800;margin-bottom:14px"><i class="fa-solid fa-star" style="color:#f59e0b"></i> Chi tiết đánh giá</h4>' +
        '<div style="display:grid;gap:8px;font-size:.92rem">' +
        '<div><strong>Mã:</strong> ' + escapeHtml(r.id) + '</div>' +
        '<div><strong>Người dùng:</strong> ' + escapeHtml(r.userName) + '</div>' +
        '<div><strong>Sản phẩm:</strong> ' + escapeHtml(p.name || '—') + '</div>' +
        '<div><strong>Đánh giá:</strong> ' + stars + '</div>' +
        (r.suggestion ? '<div><strong>Gợi ý:</strong> "' + escapeHtml(r.suggestion) + '"</div>' : '') +
        (r.comment ? '<div><strong>Nhận xét:</strong> ' + escapeHtml(r.comment) + '</div>' : '') +
        '<div><strong>Ngày:</strong> ' + new Date(r.createdAt).toLocaleDateString('vi-VN') + '</div>' +
        '</div>' + mediaHtml +
        '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px"><button class="btn-ghost" onclick="closeModal(\'genericModal\')">Đóng</button></div>' +
        '</div>');
      openModal("genericModal");
    }

    function startChatPoll() {
      if (chatPollTimer) clearInterval(chatPollTimer);
      chatPollTimer = setInterval(function () {
        if (ADMIN_TAB === 'chat') {
          if (currentConvId) loadMessages(currentConvId);
          loadConversations();
        }
      }, 5000);
    }

    function confirmDelete(coll, id) {
      const title = VI_COL[coll] || coll;
      $("#genericBody").html(`<h4 style="font-weight:800">Xác nhận xóa</h4><p>Hành động này không thể hoàn tác. Bạn có chắc muốn xóa ${title} này?</p><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn-ghost" onclick="closeModal('genericModal')">Hủy</button><button class="btn-eco" style="background:#dc2626" onclick="deleteItem('${coll}','${id}');closeModal('genericModal');toast('Đã xóa','warn');renderAdmin()">Xóa</button></div>`);
      openModal("genericModal");
    }

    $(function () {
      // [UPGRADE-5] Check admin session on load
      adminSessionId = sessionStorage.getItem('eco_admin_session');
      if (adminSessionId) {
        $.ajaxSetup({ headers: { 'X-Admin-Session': adminSessionId } });
      }
      loadDB();
      if (!adminSessionId) {
        showAdminLogin();
      } else {
        renderPage();
      }
      try { if (Notification && Notification.permission !== 'denied') Notification.requestPermission(); } catch(e) {}
      $(document).on("keydown", e => { if (e.key === "Escape") { $(".eco-modal").removeClass("show"); modalCount = 0; $("body").css("overflow", ""); } });
      $(document).on("input", "#banCustomH", function() {
        const v = parseInt($(this).val());
        if (v && v > 0) {
          window._banDuration = v;
          const label = v >= 24 ? `${v/24} ngày` : `${v} giờ`;
          $("#banPreview").text(`Cấm ${label} - Tự động mở khóa sau ${label}.`);
          $("#banConfirmBtn").prop("disabled", false);
        } else {
          $("#banPreview").text("Nhập số giờ hợp lệ");
          $("#banConfirmBtn").prop("disabled", true);
        }
      });
      window.addEventListener("storage", e => {
        if (e.key === DB_KEY) {
          const raw = localStorage.getItem(DB_KEY);
          if (!raw) return;
          try {
            const fd = JSON.parse(raw);
            ["products","users","orders","categories","suppliers","certifications","settings","payments","tracking","favorites","listings","promoCodes","wallets","listingOrders","reviews","farmNotify"].forEach(k => { if (fd[k]) DB[k] = fd[k]; });
            renderPage();
          } catch(_) {}
        }
      });
    });
  </script>
</body>
</html>
